[package]
name = "sand"
version = "0.1.0"
edition = "2024"
default-run = "debug"

# integration tests under tests/ directory

[dependencies]
anyhow = "1"
pest = "2.8.4"
pest_derive = "2.8.4"
petgraph = "0.8.3"
take-if = "1"
thiserror = "2"
tower-lsp = "0.20.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "io-std", "fs"] }
toml = "1"
serde = "1.0.228"
bimap = "0.6.3"
